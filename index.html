<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모바일 청첩장</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 1페이지 -->
<div class="section" id="page1">
  <div id="page1-scene">
    <img src="upper_back.png" id="page1-upper">
    <img src="background.gif" id="page1-bg">
    <img src="character.gif" id="page1-char">
  </div>

  <!-- 하단 이름 문구 -->
  <img src="bottom_back.png" id="page1-bottom">
  <div id="page1-names">
    <div class="name-block">
      <span class="name-parents" id="name-parent-left">김옥현의 차남</span>
      <span class="name-main" id="name-main-left">이현승</span>
    </div>
    <img src="heart.png" id="page1-heart">
    <div class="name-block">
      <span class="name-parents" id="name-parent-right">이홍철, 유선희의 장녀</span>
      <span class="name-main" id="name-main-right">이수현</span>
    </div>
  </div>

  <div id="page1-scroll-hint" onclick="onScrollHintClick()">
    <span id="page1-scroll-label">넘어가기</span>
    <div id="page1-chevrons">
      <svg viewBox="0 0 40 20" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,2 20,14 36,2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg viewBox="0 0 40 20" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,2 20,14 36,2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>

<!-- 2페이지: 인사말 -->
<div class="section" id="page2">
  <img src="2pupper.png" id="p2-upper">
  <img src="2pbottom.png" id="p2-bottom">
  <div id="p2-title-block">
    <span id="p2-title-sub">드리는</span>
    <span id="p2-title-main">말씀</span>
  </div>
  <div id="greeting-bubble">
    <div id="greeting-text"></div>
    <div id="bubble-tail"></div>
  </div>
  <div id="greeting-char-anchor"></div>
  <div id="page2-scroll-hint" onclick="onPage2ScrollHintClick()">
    <span id="page2-scroll-label">넘어가기</span>
    <div id="page2-chevrons">
      <svg viewBox="0 0 40 20" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,2 20,14 36,2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg viewBox="0 0 40 20" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,2 20,14 36,2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>

<!-- 3페이지: 타임라인 -->
<div class="section" id="page3">
  <!-- 페이지 제목 -->
  <div id="page2-header">
    <div id="page2-title">우리가 걸어온 길</div>
    <div id="page2-divider"></div>
    <div id="page2-sub">OUR STORY</div>
  </div>

  <div class="timeline">
    <div class="line"></div>
    <div class="start-dot"></div>
    <img src="topview.gif" id="topview">

    <!-- 홀수: 사진 왼쪽, 텍스트 오른쪽 -->
    <div class="tl-entry left" id="e1">
      <div class="tl-dot"></div>
      <div class="tl-photo" id="p1"><img src="photo1.jpg"></div>
      <div class="tl-text">
        <div class="tl-date" id="td1"></div>
        <div class="tl-title" id="tt1"></div>
      </div>
    </div>

    <!-- 짝수: 텍스트 왼쪽, 사진 오른쪽 -->
    <div class="tl-entry right" id="e2">
      <div class="tl-dot"></div>
      <div class="tl-text">
        <div class="tl-date" id="td2"></div>
        <div class="tl-title" id="tt2"></div>
      </div>
      <div class="tl-photo" id="p2"><img src="photo2.jpg"></div>
    </div>

    <div class="tl-entry left" id="e3">
      <div class="tl-dot"></div>
      <div class="tl-photo" id="p3"><img src="photo3.jpg"></div>
      <div class="tl-text">
        <div class="tl-date" id="td3"></div>
        <div class="tl-title" id="tt3"></div>
      </div>
    </div>

    <div class="tl-entry right" id="e4">
      <div class="tl-dot"></div>
      <div class="tl-text">
        <div class="tl-date" id="td4"></div>
        <div class="tl-title" id="tt4"></div>
      </div>
      <div class="tl-photo" id="p4"><img src="photo4.jpg"></div>
    </div>

    <div class="tl-entry left" id="e5">
      <div class="tl-dot"></div>
      <div class="tl-photo" id="p5"><img src="photo5.jpg"></div>
      <div class="tl-text">
        <div class="tl-date" id="td5"></div>
        <div class="tl-title" id="tt5"></div>
      </div>
    </div>
  </div>

  <button class="button btn-down" onclick="goToPage(3)">↓</button>
</div>

<!-- 4페이지: 일시 & 장소 -->
<div class="section" id="page4">
  <div class="title">📅 일시 & 장소</div>
  <div class="subtitle">
    2026년 9월 05일<br>
    오후 2시<br><br>
    서울 ○○웨딩홀
  </div>
  <button class="button" onclick="goToPage(0)">↑</button>
</div>

<!-- 배경음악 -->
<audio id="bgm" src="song.mp3" loop></audio>
<!-- 효과음 -->
<audio id="sfx-heart" src="heart.mp3" preload="auto"></audio>
<audio id="sfx-down" src="down.mp3" preload="auto"></audio>
<audio id="sfx-drop" src="drop.mp3" preload="auto"></audio>
<audio id="sfx-background" src="background.wav" preload="auto"></audio>
<audio id="sfx-walk" src="walk.mp3" preload="auto"></audio>
<audio id="sfx-typing" src="typing.mp3" preload="auto" loop></audio>
<audio id="sfx-button" src="button.mp3" preload="auto"></audio>

<!-- 스플래시 화면 -->
<div id="splash">
  <div id="splash-inner">
    <div id="splash-sub">우리의 특별한 날에</div>
    <div id="splash-title">Wedding<br>Invitation</div>
    <div id="splash-date">2026 · 09 · 05</div>
    <button id="splash-btn" onclick="startExperience()">
      ♪ &nbsp;청첩장 열기
    </button>
  </div>
</div>

<!-- 상세보기 -->
<div id="detail" style="display:none;">
  <div class="detail-top"><img id="detail-img"></div>
  <div class="detail-bottom">
    <div class="detail-content">
      <p id="detail-date"></p>
      <h2 id="detail-title"></h2>
      <p id="detail-desc"></p>
    </div>
    <button class="close-btn" onclick="closeDetail()">✕ 닫기</button>
  </div>
</div>

<script src="script.js"></script>
<img id="tl-heart" src="heart.png">
</body>
</html>
